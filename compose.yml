version: "3.9"

services:
  playwright-service:
    build: .
    container_name: playwright-service

    ports:
      - "3000:3000"
      - "9229:9229"

    volumes:
      - .:/app
      - /app/node_modules

    networks:
      - local-shared-network

    environment:
      NODE_ENV: development
      PORT: "3000"
      LOG_LEVEL: debug
      SAAS_BASE_URL: ${SAAS_BASE_URL:-http://host.docker.internal:5173}
      SAAS_LOGIN_URL: ${SAAS_LOGIN_URL:-http://host.docker.internal:5173/login}
      SAAS_USERNAME: ${SAAS_USERNAME:-admin}
      SAAS_PASSWORD: ${SAAS_PASSWORD:-password123}
      BROWSER_HEADLESS: "true"
      BROWSER_SLOW_MO: "0"
      BROWSER_MAX_CONTEXTS: "5"

    command:
      - node
      - --inspect=0.0.0.0:9229
      - --enable-source-maps
      - --import=tsx
      - src/app/server.ts

    shm_size: "2gb"

networks:
  local-shared-network:
    external: true