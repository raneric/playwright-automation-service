version: "3.9"

services:
  playwright-service:
    build: .
    container_name: playwright-service

    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - .:/app
      - /app/node_modules

    networks:
      - local-shared-network

    environment:
      NODE_ENV: development
      # n8n connection — n8n is reachable by its container name on the shared network
      N8N_BASE_URL: http://n8n:5678
      # Login credentials for the target ticketing system
      LOGIN_URL: ${LOGIN_URL:-}
      LOGIN_USERNAME: ${LOGIN_USERNAME:-}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-}
      BASE_URL: ${BASE_URL:-}

    command:
      - node
      - --inspect=0.0.0.0:9229
      - --enable-source-maps
      - --import=tsx
      - src/index.ts

    shm_size: "2gb"

networks:
  local-shared-network:
    external: true
